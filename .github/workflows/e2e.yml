name: E2E – ING cookie consent

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # UWAGA: czas UTC. Dla polskiego lata (CEST) 9/12/15 to "0 7,10,13 * * 1-5".
    - cron: "0 9,12,15 * * 1-5"   # pon–pt, 09/12/15 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: ${{ matrix.browser }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (${{ matrix.browser }})
        run: playwright install --with-deps ${{ matrix.browser }}

      # --- Tailscale (na później; odkomentuj, gdy laptop-exit-node będzie gotowy) ---
      # - name: Connect to Tailscale
      #   uses: tailscale/github-action@v3
      #   with:
      #     oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
      #     oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
      #     tags: tag:ci
      # - name: Route egress via home exit node
      #   run: |
      #     sudo tailscale set --exit-node="${{ secrets.TS_EXIT_NODE }}" --exit-node-allow-lan-access
      #     curl -s https://api.ipify.org || true

      - name: Run E2E test
        run: >
          pytest
          --browser ${{ matrix.browser }}
          --junitxml=results-${{ matrix.browser }}.xml
          --html=report-${{ matrix.browser }}.html
          --self-contained-html

      # - name: Stop routing via exit node
      #   if: always()
      #   run: sudo tailscale set --exit-node= || true

      - name: Podsumowanie w GUI (z results.xml)
        if: always()
        run: python scripts/junit_to_summary.py results-${{ matrix.browser }}.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Link do raportu pod tabelką
        if: always()
        run: echo "### 📊 [Pełny raport HTML](https://qbagrabo.github.io/ic-test/report-${{ matrix.browser }}.html)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: report-${{ matrix.browser }}
          path: |
            report-${{ matrix.browser }}.html
            results-${{ matrix.browser }}.xml
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  publish-report:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: Pobierz raporty z jobów
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Złóż stronę (nadpisuje poprzednią)
        run: |
          mkdir -p site
          find artifacts -name 'report-*.html' -exec cp {} site/ \;
          {
            echo "<h1>Raporty E2E – ING cookie consent</h1>"
            echo "<p>Run #${{ github.run_number }} &middot; $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo "<ul>"
            for f in site/report-*.html; do n=$(basename "$f"); echo "<li><a href=\"$n\">$n</a></li>"; done
            echo "</ul>"
          } > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Link zbiorczy w podsumowaniu
        if: always()
        run: echo "### 📊 [Wszystkie raporty (index)](${{ steps.deploy.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"