name: E2E – ING cookie consent

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # UWAGA: czas UTC. Dla polskiego lata (CEST) 16 UTC to 18 CEST.
    - cron: "0 16 * * *"   # codziennie o 16:00 UTC

jobs:
  e2e:
    runs-on: ubuntu-latest
    name: ${{ matrix.browser }}
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser (${{ matrix.browser }})
        run: playwright install --with-deps ${{ matrix.browser }}

      # --- Tailscale: wyjście przez domowy exit node (fallback: test działa nawet gdy node offline) ---
      - name: Connect to Tailscale
        id: tailscale
        continue-on-error: true
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
      - name: Route egress via home exit node
        id: exit_node
        if: steps.tailscale.outcome == 'success'
        continue-on-error: true
        run: |
          set -e
          echo "::group::Tailscale status (przed)"
          tailscale status || true
          echo "::endgroup::"

          IP_DIRECT=$(curl -s --max-time 10 https://api.ipify.org || echo "unknown")
          echo "IP bez exit node: $IP_DIRECT"

          sudo tailscale set --exit-node="${{ secrets.TS_EXIT_NODE }}" --exit-node-allow-lan-access

          echo "::group::Tailscale status (po)"
          tailscale status || true
          echo "::endgroup::"

          IP_EXIT=$(curl -s --max-time 10 https://api.ipify.org || echo "unknown")
          echo "IP przez exit node: $IP_EXIT"

          if [ "$IP_EXIT" = "unknown" ] || [ "$IP_EXIT" = "$IP_DIRECT" ]; then
            echo "::error::Routing NIE idzie przez exit node (IP się nie zmieniło: $IP_DIRECT -> $IP_EXIT). Sprawdź czy node jest online i approved jako exit node."
            exit 1
          fi
          echo "✅ Egress przez exit node: $IP_EXIT (było $IP_DIRECT)"
      - name: Ostrzeżenie gdy exit node niedostępny
        if: steps.tailscale.outcome != 'success' || steps.exit_node.outcome != 'success'
        run: |
          echo "::warning::Exit node niedostępny – test biegnie przez IP runnera GitHub (nie przez domowy node)."
          echo "⚠️ Exit node niedostępny – ruch szedł przez IP runnera GitHub, nie przez domowy node." >> "$GITHUB_STEP_SUMMARY"

      - name: Run E2E test
        run: >
          pytest
          --browser ${{ matrix.browser }}
          --junitxml=results-${{ matrix.browser }}.xml
          --html=report-${{ matrix.browser }}.html
          --self-contained-html

      - name: Stop routing via exit node
        if: always()
        run: sudo tailscale set --exit-node= || true

      - name: Podsumowanie w GUI (z results.xml)
        if: always()
        run: python scripts/junit_to_summary.py results-${{ matrix.browser }}.xml >> "$GITHUB_STEP_SUMMARY"

      - name: Link do raportu pod tabelką
        if: always()
        run: echo "### 📊 [Pełny raport HTML](https://qbagrabo.github.io/ic-test/report-${{ matrix.browser }}.html)" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: report-${{ matrix.browser }}
          path: |
            report-${{ matrix.browser }}.html
            results-${{ matrix.browser }}.xml
            test-results/
          retention-days: 14
          if-no-files-found: ignore

  publish-report:
    needs: e2e
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    concurrency:
      group: pages-deploy
      cancel-in-progress: false
    steps:
      - name: Pobierz raporty z jobów
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Złóż stronę (nadpisuje poprzednią)
        run: |
          mkdir -p site
          find artifacts -name 'report-*.html' -exec cp {} site/ \;
          {
            echo "<h1>Raporty E2E – ING cookie consent</h1>"
            echo "<p>Run #${{ github.run_number }} &middot; $(date -u '+%Y-%m-%d %H:%M UTC')</p>"
            echo "<ul>"
            for f in site/report-*.html; do n=$(basename "$f"); echo "<li><a href=\"$n\">$n</a></li>"; done
            echo "</ul>"
          } > site/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Link zbiorczy w podsumowaniu
        if: always()
        run: echo "### 📊 [Wszystkie raporty (index)](${{ steps.deploy.outputs.page_url }})" >> "$GITHUB_STEP_SUMMARY"